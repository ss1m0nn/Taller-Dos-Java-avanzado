services:
  postgres:
    image: postgres
    container_name: ecommerce-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
    restart: no

volumes:
  postgres_data: